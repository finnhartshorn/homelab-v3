---
apiVersion: v1
kind: Service
metadata:
  name: homeassistant
spec:
  ports:
    - name: http
      port: 8123
      targetPort: 8123
---
apiVersion: v1
kind: Endpoints
metadata:
  name: homeassistant
subsets:
  - addresses:
      - ip: 192.168.1.231
    ports:
      - name: http
        port: 8123
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homeassistant
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.org/websocket-services: homeassistant
spec:
  ingressClassName: internal
  rules:
    - host: homeassistant.${SECRET_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homeassistant
                port:
                  name: http

---
apiVersion: v1
kind: Service
metadata:
  name: quiz
spec:
  ports:
    - name: http
      port: 3002
      targetPort: 3002
---
apiVersion: v1
kind: Endpoints
metadata:
  name: quiz
subsets:
  - addresses:
      - ip: 192.168.1.212
    ports:
      - name: http
        port: 3002
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quiz
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: internal
  rules:
    - host: quiz.${SECRET_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quiz
                port:
                  name: http

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/home-operations/tuppr/main/charts/tuppr/crds/tuppr.home-operations.com_talosupgrades.yaml
apiVersion: tuppr.home-operations.com/v1alpha1
kind: TalosUpgrade
metadata:
  name: cluster
spec:
  # Kept in lockstep with talconfig.yaml via the shared renovate depName below.
  # Renovate proposes the latest available tag, not the next sequential minor -
  # only merge a step at a time, following the supported upgrade path.
  talos:
    # renovate: datasource=docker depName=ghcr.io/siderolabs/installer
    version: v1.11.6

  healthChecks:
    - apiVersion: v1
      kind: Node
      expr: status.conditions.exists(c, c.type == "Ready" && c.status == "True")
      timeout: 10m

  # TEMPORARY: maintenance omitted entirely to manually trigger the v1.9.6
  # test run now. Restore the nightly 01:00-05:00 Australia/Sydney window after.

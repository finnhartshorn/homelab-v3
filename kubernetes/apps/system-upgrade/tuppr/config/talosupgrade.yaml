---
# yaml-language-server: $schema=https://raw.githubusercontent.com/home-operations/tuppr/main/charts/tuppr/crds/tuppr.home-operations.com_talosupgrades.yaml
apiVersion: tuppr.home-operations.com/v1alpha1
kind: TalosUpgrade
metadata:
  name: cluster
spec:
  # Kept in lockstep with talconfig.yaml via the shared renovate depName below.
  # Renovate proposes the latest available tag, not the next sequential minor -
  # only merge a step at a time, following the supported upgrade path.
  talos:
    # renovate: datasource=docker depName=ghcr.io/siderolabs/installer
    version: v1.13.6

  healthChecks:
    - apiVersion: v1
      kind: Node
      expr: status.conditions.exists(c, c.type == "Ready" && c.status == "True")
      timeout: 10m

    # kubelet reports Node Ready again within seconds of a control-plane
    # reboot, well before etcd's raft group has actually restabilised -
    # that gap let tuppr start upgrading the next node straight into an
    # etcd that was still timing out requests. etcd-health-watcher polls
    # kube-apiserver's /healthz/etcd directly on each node (bypassing the
    # load-balanced VIP) and publishes the result here every ~10s.
    - apiVersion: v1
      kind: ConfigMap
      name: etcd-health
      namespace: system-upgrade
      expr: object.data.healthy == "true"
      timeout: 10m

  maintenance:
    windows:
      - start: "0 1 * * *"
        duration: "4h"
        timezone: "Australia/Sydney"

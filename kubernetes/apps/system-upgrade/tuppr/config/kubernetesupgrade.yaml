---
# yaml-language-server: $schema=https://raw.githubusercontent.com/home-operations/tuppr/main/charts/tuppr/crds/tuppr.home-operations.com_kubernetesupgrades.yaml
apiVersion: tuppr.home-operations.com/v1alpha1
kind: KubernetesUpgrade
metadata:
  name: cluster
spec:
  # Kept in lockstep with talconfig.yaml via a dedicated renovate manager (see
  # .github/renovate.json5) - the CRD requires the "v" prefix, which the
  # generic depName-comment convention used elsewhere would strip.
  # Renovate proposes the latest available tag, not the next sequential minor -
  # only merge a step at a time, following the supported upgrade path.
  kubernetes:
    version: v1.32.13

  healthChecks:
    - apiVersion: v1
      kind: Node
      expr: status.conditions.exists(c, c.type == "Ready" && c.status == "True")
      timeout: 10m

  maintenance:
    windows:
      - start: "0 1 * * *"
        duration: "4h"
        timezone: "Australia/Sydney"

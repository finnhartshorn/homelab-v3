---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: etcd-health-watcher
---
# Nodes are cluster-scoped, so discovering each control-plane node's own IP
# (to hit its kube-apiserver directly, not the load-balanced VIP) needs a
# ClusterRole rather than a namespaced Role.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: etcd-health-watcher
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # The default system:public-info-viewer binding only covers the bare
  # /healthz, /livez, /readyz paths - not sub-checks like /healthz/etcd.
  - nonResourceURLs: ["/healthz/etcd"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: etcd-health-watcher
subjects:
  - kind: ServiceAccount
    name: etcd-health-watcher
    namespace: system-upgrade
roleRef:
  kind: ClusterRole
  name: etcd-health-watcher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: etcd-health-watcher
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: etcd-health-watcher
subjects:
  - kind: ServiceAccount
    name: etcd-health-watcher
roleRef:
  kind: Role
  name: etcd-health-watcher
  apiGroup: rbac.authorization.k8s.io

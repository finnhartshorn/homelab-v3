---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tuppr-watchdog
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tuppr-watchdog
rules:
  - apiGroups: ["tuppr.home-operations.com"]
    resources: ["talosupgrades", "kubernetesupgrades"]
    resourceNames: ["cluster"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tuppr-watchdog
subjects:
  - kind: ServiceAccount
    name: tuppr-watchdog
roleRef:
  kind: Role
  name: tuppr-watchdog
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tuppr-watchdog
---
# talosupgrades/kubernetesupgrades are cluster-scoped (not namespaced), so
# this needs a ClusterRole/ClusterRoleBinding rather than Role/RoleBinding.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tuppr-watchdog
rules:
  - apiGroups: ["tuppr.home-operations.com"]
    resources: ["talosupgrades", "kubernetesupgrades"]
    resourceNames: ["cluster"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tuppr-watchdog
subjects:
  - kind: ServiceAccount
    name: tuppr-watchdog
    namespace: system-upgrade
roleRef:
  kind: ClusterRole
  name: tuppr-watchdog
  apiGroup: rbac.authorization.k8s.io

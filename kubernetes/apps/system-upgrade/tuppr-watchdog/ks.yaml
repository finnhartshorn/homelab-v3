---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app tuppr-watchdog
  namespace: flux-system
  # The watchdog script's shell variables (${PREFIX}) would otherwise collide
  # with Flux's own ${VAR} postBuild substitution.
  labels:
    substitution.flux.home.arpa/disabled: "true"
spec:
  targetNamespace: system-upgrade
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: tuppr
  path: ./kubernetes/apps/system-upgrade/tuppr-watchdog/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: false
  interval: 30m
  timeout: 5m

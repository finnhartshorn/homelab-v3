---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tuppr-log-capture
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tuppr-log-capture
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tuppr-log-capture
subjects:
  - kind: ServiceAccount
    name: tuppr-log-capture
roleRef:
  kind: Role
  name: tuppr-log-capture
  apiGroup: rbac.authorization.k8s.io

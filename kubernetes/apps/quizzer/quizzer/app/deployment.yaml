apiVersion: apps/v1
kind: Deployment
metadata:
  name: quizzer
  namespace: quizzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: quizzer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quizzer
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: forgejo-registry
      containers:
        - name: quizzer
          image: git.finnethen.com/finn/quizzer:v0.8.1
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quizzer-db-secret
                  key: databaseUrl
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: quizzer-minio-secret
                  key: S3_BUCKET
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: quizzer-minio-secret
                  key: S3_ENDPOINT
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: quizzer-minio-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: quizzer-minio-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: quizzer-minio-secret
                  key: AWS_REGION
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

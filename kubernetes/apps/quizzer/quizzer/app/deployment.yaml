apiVersion: apps/v1
kind: Deployment
metadata:
  name: quizzer
  namespace: quizzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: quizzer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quizzer
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: forgejo-registry
      containers:
        - name: quizzer
          image: git.finnethen.com/finn/quizzer:v0.2.1
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quizzer-db-secret
                  key: databaseUrl
            - name: QUIZZES_DIR
              value: /app/data/quizzes
          volumeMounts:
            - name: quizzes
              mountPath: /app/data/quizzes
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: quizzes
          persistentVolumeClaim:
            claimName: quizzer-quizzes

---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./windmill/ks.yaml
  - ./forgejo/ks.yaml
  - ./home-assistant/ks.yaml
  - ./home-assistant/piper/ks.yaml
  - ./home-assistant/matter-server/ks.yaml
components:
  - ../../flux/components/namespace
patches:
  - # Add the name to the namespace
    patch: |
      - op: add
        path: /metadata/name
        value: windmill
    target:
      kind: Namespace
  - # Add the name to the namespace
    patch: |
      - op: add
        path: /metadata/name
        value: forgejo
    target:
      kind: Namespace
  - # Add the name to the namespace
    patch: |
      - op: add
        path: /metadata/name
        value: home-assistant
    target:
      kind: Namespace


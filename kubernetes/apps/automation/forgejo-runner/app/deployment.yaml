---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo
  labels:
    app: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      automountServiceAccountToken: false
      restartPolicy: Always
      initContainers:
      - name: runner-config
        image: code.forgejo.org/forgejo/runner:12.13.0
        command: ["/bin/bash", "-c"]
        args:
        - |
          forgejo-runner generate-config > /data/config.yml
          sed -i -e "s|network: .*|network: host|" /data/config.yml
          sed -i -e "s|^  envs:.*|  envs:\n    DOCKER_HOST: tcp://localhost:2376\n    DOCKER_TLS_VERIFY: 1\n    DOCKER_CERT_PATH: /certs/client|" /data/config.yml
          sed -i -e "s|^  options:.*|  options: -v /certs/client:/certs/client|" /data/config.yml
          sed -i -e "s| valid_volumes: \[\]$| valid_volumes:\n   - /certs/client|" /data/config.yml
          echo "=== generated config ===" && cat /data/config.yml
        volumeMounts:
        - name: runner-data
          mountPath: /data
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
      containers:
      - name: runner
        image: code.forgejo.org/forgejo/runner:12.13.0
        command: ["/bin/bash", "-c"]
        args:
        - |
          while ! nc -z localhost 2376 </dev/null; do
            echo 'waiting for docker daemon...'
            sleep 5
          done
          forgejo-runner daemon \
            --config /data/config.yml \
            --url http://forgejo-http.forgejo.svc.cluster.local:3000 \
            --uuid $(RUNNER_UUID) \
            --token-url file:///runner-secret/token \
            --label docker:docker://catthehacker/ubuntu:act-24.04
        env:
        - name: RUNNER_UUID
          value: "a69b3fd3-8932-41ea-a65f-7d67e8c80444"
        - name: DOCKER_HOST
          value: tcp://localhost:2376
        - name: DOCKER_CERT_PATH
          value: /certs/client
        - name: DOCKER_TLS_VERIFY
          value: "1"
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
        - name: docker-certs
          mountPath: /certs
        - name: runner-data
          mountPath: /data
        - name: runner-secret
          mountPath: /runner-secret
          readOnly: true
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
      - name: daemon
        image: docker.io/docker:29.6.2-dind
        env:
        - name: DOCKER_TLS_CERTDIR
          value: /certs
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: 100m
            memory: 64Mi
        securityContext:
          privileged: true
        volumeMounts:
        - name: docker-certs
          mountPath: /certs
      volumes:
      - name: docker-certs
        emptyDir: {}
      - name: runner-data
        emptyDir: {}
      - name: runner-secret
        secret:
          secretName: forgejo-runner-secret
      - name: tmp
        emptyDir: {}

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultSettings:
      concurrentAutomaticEngineUpgradePerNodeLimit: 1
      # node3 had 7 volumes degraded at once, all rebuilding in parallel onto
      # the same already-overloaded node (up to 5 concurrent per the old
      # default) - each rebuild streams a full replica's data with only a
      # 30s file-sync timeout, so contention from stacking several at once
      # was pushing transfers past that timeout and failing with EOF, which
      # just triggered an immediate retry into the same pile-up. Capping to
      # 1 lets rebuilds queue instead of fighting each other for the same
      # disk/CPU.
      concurrentReplicaRebuildPerNodeLimit: 1
      # CSI sidecars had no resource requests at all, so the scheduler treated
      # them as free to stack anywhere - a contributor to node3 ending up with
      # far more pods than node1/node2. One JSON blob covers every
      # system-managed CSI component (see Longhorn docs for the setting).
      systemManagedCSIComponentsResourceLimits: '{"csi-attacher":{"requests":{"cpu":"10m","memory":"20Mi"}},"csi-provisioner":{"requests":{"cpu":"10m","memory":"20Mi"}},"csi-resizer":{"requests":{"cpu":"10m","memory":"20Mi"}},"csi-snapshotter":{"requests":{"cpu":"10m","memory":"20Mi"}},"longhorn-csi-plugin":{"requests":{"cpu":"10m","memory":"32Mi"}},"node-driver-registrar":{"requests":{"cpu":"10m","memory":"20Mi"}},"longhorn-liveness-probe":{"requests":{"cpu":"10m","memory":"20Mi"}}}'
    monitoring:
        enabled: true
        createPrometheusRules: false
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 3
      reclaimPolicy: Delete
      recurringJobSelector:
        enable: true
    ingress:
      enabled: true
      ingressClassName: internal
      host: "longhorn.${SECRET_DOMAIN}"
      path: /
      pathType: Prefix

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: telegraf-config
  namespace: observability
data:
  telegraf.conf: |
    [agent]
      interval = "30s"
      flush_interval = "30s"
      omit_hostname = true

    [[inputs.prometheus]]
      urls = ["http://influxdb.observability.svc.cluster.local:8086/metrics"]
      [inputs.prometheus.headers]
        Authorization = "Bearer ${INFLUXDB3_TOKEN}"

    [[inputs.prometheus]]
      urls = ["http://longhorn-backend.longhorn-system.svc.cluster.local:9500/metrics"]

    [[outputs.influxdb_v2]]
      urls = ["http://influxdb.observability.svc.cluster.local:8086"]
      token = "${INFLUXDB3_TOKEN}"
      organization = ""
      bucket = "telegraf"

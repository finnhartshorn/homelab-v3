---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
spec:
  interval: 1h
  chart:
    spec:
      chart: grafana
      version: ">=9.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    deploymentStrategy:
      type: Recreate
    admin:
      existingSecret: grafana-admin
    envFromSecret: influxdb-auth
    grafana.ini:
      analytics:
        check_for_updates: false
        check_for_plugin_updates: false
        reporting_enabled: false
      server:
        root_url: "https://grafana.${SECRET_DOMAIN}"
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: InfluxDB
            type: influxdb
            access: proxy
            url: http://influxdb.observability.svc.cluster.local:8086
            jsonData:
              version: Flux
              organization: ""
              defaultBucket: ""
            secureJsonData:
              token: $INFLUXDB3_TOKEN
    ingress:
      enabled: true
      ingressClassName: internal
      hosts:
        - &host "grafana.${SECRET_DOMAIN}"
      tls:
        - hosts:
            - *host
    persistence:
      enabled: true
      type: pvc
      storageClassName: longhorn
      accessModes:
        - ReadWriteOnce
      size: 10Gi
    testFramework:
      enabled: false
